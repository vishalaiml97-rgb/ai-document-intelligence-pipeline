version: "3.8"

services:
  pipeline:
    build: .
    container_name: document-pipeline
    volumes:
      - ./input_docs:/app/input_docs
      - ./json_output:/app/json_output
      - ./logs:/app/logs
      - ./chroma_db:/app/chroma_db
    depends_on:
      - postgres
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=pipeline_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres123

  postgres:
    image: postgres:17
    container_name: pipeline-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: pipeline_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
